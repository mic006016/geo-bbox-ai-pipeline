<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Geo-AI 도로 노면 관제 센터</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #sidebar {
        width: 350px;
        background: #2c3e50;
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        overflow-y: auto;
      }
      #map {
        flex: 1;
        height: 100%;
      }
      h1 {
        margin-top: 0;
        font-size: 1.5rem;
        border-bottom: 2px solid #34495e;
        padding-bottom: 10px;
        color: #ecf0f1;
      }
      .card {
        background: #34495e;
        padding: 15px;
        border-radius: 6px;
      }
      .card h3 {
        margin-top: 0;
        color: #ecf0f1;
      }
      input[type="file"] {
        display: none;
      }
      .custom-file-upload {
        display: block;
        background: #1abc9c;
        color: white;
        text-align: center;
        padding: 10px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s;
      }
      .custom-file-upload:hover {
        background: #16a085;
      }
      #upload-status {
        margin-top: 10px;
        font-size: 0.9rem;
        color: #bdc3c7;
      }
      #status-counts {
        font-size: 1.1rem;
        font-weight: bold;
        color: #f1c40f;
        margin-bottom: 15px;
      }
      .stat-item {
        display: flex;
        justify-content: space-between;
        background: #2c3e50;
        padding: 8px 12px;
        border-radius: 4px;
        margin-bottom: 6px;
        font-size: 0.9rem;
        border-left: 4px solid #e74c3c;
      }
      .stat-item .count {
        font-weight: bold;
        color: #f1c40f;
      }
      #image-preview-container {
        position: absolute;
        bottom: 25px;
        right: 25px;
        width: 320px;
        background: #000;
        border-radius: 8px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        display: none;
        overflow: hidden;
      }
      .close-btn-overlay {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        transition: background 0.2s;
      }
      .close-btn-overlay:hover {
        background: rgba(231, 76, 60, 0.9);
      }
      #preview-img {
        width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>🚧 Geo-AI 노면 관제 센터</h1>

      <div class="card">
        <h3>📸 블랙박스 파손 데이터 업로드</h3>
        <p style="font-size: 0.85rem; color: #ccc">
          GPS 정보(Exif)가 포함된 노면 사진을 업로드하면 실시간으로 지도에
          매핑되며 AI 분석이 시작됩니다.
        </p>
        <form id="upload-form">
          <label for="image-input" class="custom-file-upload"
            >📁 사진 선택 및 전송</label
          >
          <input type="file" id="image-input" accept="image/*" />
        </form>
        <div id="upload-status"></div>
        <button
          id="btn-reset"
          class="custom-file-upload"
          style="background: #e7563c; margin-top: 10px"
        >
          지도 및 DB 전체 초기화
        </button>
      </div>

      <div class="card">
        <h3>📊 분석 클래스 통계</h3>
        <div id="status-counts">현재 화면 내 전체 파손: 0건</div>

        <div id="class-stats-container"></div>

        <p style="font-size: 0.8rem; color: #bdc3c7; margin-top: 15px">
          지도에 표시된
          <span style="color: #e74c3c; font-weight: bold">빨간색 마커</span>를
          클릭하면 AI가 판독한 클래스와 신뢰도를 확인할 수 있습니다.
        </p>
      </div>
    </div>

    <div id="map"></div>

    <div id="image-preview-container">
      <span
        class="close-btn-overlay"
        onclick="
          document.getElementById('image-preview-container').style.display =
            'none'
        "
        >✖</span
      >
      <img id="preview-img" src="" alt="현장 사진 미리보기" />
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script>
      const map = L.map("map").setView([37.5665, 126.978], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      let geojsonLayer = L.geoJSON(null, {
        pointToLayer: function (feature, latlng) {
          return L.circleMarker(latlng, {
            radius: 8,
            fillColor: "#ff0000",
            color: "#ffffff",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9,
          });
        },
        onEachFeature: function (feature, layer) {
          const p = feature.properties;

          const className = p.objectType || "분석 대기 중";
          const confidenceText = p.confidence
            ? (p.confidence * 100).toFixed(1) + "%"
            : "계산 중...";

          layer.bindPopup(`
            <div style="font-family: sans-serif; line-height: 1.5; min-width: 180px;">
                <b style="font-size: 1.2rem; color: #c0392b;">🚨 ${className}</b><br>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 8px 0;">
                <b>AI 신뢰도:</b> <span style="color:#2980b9; font-weight:bold;">${confidenceText}</span><br>
                <b>처리 상태:</b> ${p.status}<br>
                <div style="font-size: 0.8rem; color: #7f8c8d; margin-top: 5px;">
                  등록: ${new Date(p.createdAt).toLocaleString()}
                </div>
            </div>
          `);
        },
      }).addTo(map);

      function fetchMapData() {
        const bounds = map.getBounds();
        const minLon = bounds.getWest();
        const minLat = bounds.getSouth();
        const maxLon = bounds.getEast();
        const maxLat = bounds.getNorth();

        fetch(
          `/api/spatial/bbox?minLon=${minLon}&minLat=${minLat}&maxLon=${maxLon}&maxLat=${maxLat}`,
        )
          .then((res) => res.json())
          .then((geoJsonData) => {
            geojsonLayer.clearLayers();
            geojsonLayer.addData(geoJsonData);

            const features = geoJsonData.features || [];

            document.getElementById("status-counts").innerHTML =
              `현재 화면 내 전체 파손: <b>${features.length}</b>건`;

            const classCounts = {};
            features.forEach((f) => {
              const type = f.properties.objectType || "분석 대기 중";
              classCounts[type] = (classCounts[type] || 0) + 1;
            });

            const statsContainer = document.getElementById(
              "class-stats-container",
            );
            statsContainer.innerHTML = "";

            for (const [type, count] of Object.entries(classCounts)) {
              statsContainer.innerHTML += `
                    <div class="stat-item">
                        <span>🚨 ${type}</span>
                        <span class="count">${count}건</span>
                    </div>
                `;
            }
          })
          .catch((err) => console.error("데이터 로드 실패:", err));
      }

      map.on("moveend", fetchMapData);
      fetchMapData();

      function convertDMSToDD(degrees, minutes, seconds, direction) {
        let dd = degrees + minutes / 60 + seconds / 3600;
        if (direction === "S" || direction === "W") dd *= -1;
        return dd;
      }

      document
        .getElementById("image-input")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;

          const imgUrl = URL.createObjectURL(file);
          document.getElementById("preview-img").src = imgUrl;
          document.getElementById("image-preview-container").style.display =
            "block";

          const statusDiv = document.getElementById("upload-status");
          statusDiv.innerHTML = "⏳ 위치 분석 및 서버 업로드 중...";
          statusDiv.style.color = "#f1c40f";

          EXIF.getData(file, function () {
            const latData = EXIF.getTag(this, "GPSLatitude");
            const lonData = EXIF.getTag(this, "GPSLongitude");
            const latRef = EXIF.getTag(this, "GPSLatitudeRef");
            const lonRef = EXIF.getTag(this, "GPSLongitudeRef");

            if (latData && lonData && latRef && lonRef) {
              const lat = convertDMSToDD(
                latData[0],
                latData[1],
                latData[2],
                latRef,
              );
              const lon = convertDMSToDD(
                lonData[0],
                lonData[1],
                lonData[2],
                lonRef,
              );
              map.flyTo([lat, lon], 17, { animate: true, duration: 1.5 });
            }
          });

          const formData = new FormData();
          formData.append("image", file);

          fetch("/api/images/upload", {
            method: "POST",
            body: formData,
          })
            .then((res) => res.json())
            .then((data) => {
              if (data.success) {
                statusDiv.innerHTML = "✅ 업로드 완료! AI 분석 진행 중...";
                statusDiv.style.color = "#2ecc71";

                let count = 0;
                const interval = setInterval(() => {
                  fetchMapData();
                  count++;
                  if (count >= 3) clearInterval(interval);
                }, 1500);
              } else {
                statusDiv.innerHTML = `❌ 실패: ${data.message}`;
                statusDiv.style.color = "#e74c3c";
              }
            })
            .catch((err) => {
              console.error(err);
              statusDiv.innerHTML = "❌ 통신 오류";
              statusDiv.style.color = "#e74c3c";
            });
        });

      document
        .getElementById("btn-reset")
        .addEventListener("click", function () {
          if (confirm("🚨 데이터베이스의 모든 분석 기록을 삭제하시겠습니까?")) {
            fetch("/api/spatial/reset", {
              method: "DELETE",
            })
              .then((res) => res.json())
              .then((data) => {
                if (data.success) {
                  alert("데이터가 깔끔하게 초기화되었습니다.");
                  document.getElementById(
                    "image-preview-container",
                  ).style.display = "none";

                  // 원위치 복귀
                  map.setView([37.5665, 126.978], 13);

                  fetchMapData();
                } else {
                  alert("초기화 실패");
                }
              })
              .catch((err) => console.error("초기화 통신 오류:", err));
          }
        });
    </script>
  </body>
</html>
